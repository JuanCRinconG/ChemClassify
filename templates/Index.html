<!doctype html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <input type="text" id="accountName" class="input-field" placeholder="Account Name">
        <input type="password" id="password" class="input-field" placeholder="Password">
        <button class="login-button" onclick="handleLogin()">Login</button>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script>
        let accountName = '';
        let password = '';

        function handleLogin() {
            const accountInput = document.getElementById('accountName').value;
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // Check if fields are empty
            if (!accountInput && !passwordInput) {
                errorMessage.textContent = 'Please enter both account name and password';
                errorMessage.classList.add('show');
                return;
            } else if (!accountInput) {
                errorMessage.textContent = 'Please enter an account name';
                errorMessage.classList.add('show');
                return;
            } else if (!passwordInput) {
                errorMessage.textContent = 'Please enter a password';
                errorMessage.classList.add('show');
                return;
            }

            // Save to variables
            accountName = accountInput;
            password = passwordInput;

            // Clear error message
            errorMessage.classList.remove('show');

            // Success feedback
            alert('Login successful! Account: ' + accountName);
            console.log('Saved - Account:', accountName, 'Password:', password);
        }
    </script>
</body>
</html>
