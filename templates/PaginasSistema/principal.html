<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemClasify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='EstilosCSS/styles.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Welcome</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flash-messages">
                    {% for category, message in messages %}
                        <li class="flash-{{ category }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <p style="text-align: center; margin-bottom: 24px;">
            Signed in as <strong>{{ session_email }}</strong>
        </p>

        <form method="post" action="{{ url_for('enviar_correo_prueba_vista') }}" style="margin-bottom: 12px;">
            <button type="submit" class="button-send-test-email">Send test email</button>
        </form>

        <a href="{{ url_for('logout') }}" class="login-button" style="display: block; text-align: center; text-decoration: none; box-sizing: border-box;">Log out</a>
    </div>
</body>
</html>
