{# Reusable error dialog: include once per page that uses SistemasErrores.mostrar() #}
<div
    id="sistemas-alerta-error-overlay"
    class="sistemas-alerta-error-overlay"
    hidden
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="sistemas-alerta-error-titulo"
    aria-describedby="sistemas-alerta-error-texto"
    aria-hidden="true"
>
    <div class="sistemas-alerta-error-caja">
        <div class="sistemas-alerta-error-icono" aria-hidden="true">!</div>
        <div class="sistemas-alerta-error-cuerpo">
            <h3 id="sistemas-alerta-error-titulo" class="sistemas-alerta-error-titulo">Notice</h3>
            <p id="sistemas-alerta-error-texto" class="sistemas-alerta-error-texto"></p>
            <div class="sistemas-alerta-error-acciones">
                <button type="button" id="sistemas-alerta-error-aceptar" class="sistemas-alerta-error-aceptar">OK</button>
            </div>
        </div>
    </div>
</div>
